server:
  port: ${SERVER_PORT}
  servlet:
    context-path: ${PROJECT_API}


minio:
  url: ${MINIO_URL}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET_NAME}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}

  liquibase:
    enabled: true
    change-log: classpath:db/liquibase/liquibase-changelog.yaml

  jpa:
    hibernate:
      ddl-auto: none

    properties:
      hibernate:
        show_sql: false

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

logging:
  level:
    org.springframework.transaction: ERROR
    org.springframework.orm.jpa: ERROR
    org.springframework.jdbc: ERROR
    org.springframework.aop: ERROR