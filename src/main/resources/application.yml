server:
  port: ${SERVER_PORT}
  servlet:
    context-path: ${PROJECT_API}
#
#project:
#  api: ${PROJECT_API}

minio:
  url: ${MINIO_URL}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket-name: ${MINIO_BUCKET_NAME}

spring:
  datasource:
    url: ${DB_URL}
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}


  liquibase:
    enabled: true
    change-log: classpath:db/liquibase/liquibase-changelog.yaml

  jpa:
    hibernate:
      ddl-auto: none
#      show-sql: true
    properties:
      hibernate:
        show_sql: false

logging:
  level:
    org.springframework.transaction: ERROR
    org.springframework.orm.jpa: ERROR
    org.springframework.jdbc: ERROR
    org.springframework.aop: ERROR